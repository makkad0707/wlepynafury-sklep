<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WlepyNaFury.pl | Najlepsze naklejki motoryzacyjne</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <!-- Skrypty Mapy InPost -->
    <!-- Nowy, najnowszy skrypt Mapy InPost v5 -->
    <link rel="stylesheet" href="https://geowidget.inpost.pl/inpost-geowidget.css"/>
    <script src="https://geowidget.inpost.pl/inpost-geowidget.js" defer></script>
</head>
<body>

    <!-- Nawigacja -->
    <nav class="navbar">
        <a href="#" class="logo">WlepyNa<span>Fury</span></a>
        <div class="cart-icon" id="cart-btn">
            Koszyk (<span id="cart-count">0</span>)
        </div>
    </nav>

    <!-- Sekcja Hero -->
    <header class="hero">
        <div class="hero-content">
            <h1>Naklejki z charakterem</h1>
            <p>Jak przykleisz (nieważne na co) to ci będą robić zdjęcia.</p>
        </div>
    </header>

    <!-- Siatka Produktów -->
    <section class="products">
        <h2 class="section-title">Kolekcja</h2>
        <!-- Tutaj JS wygeneruje naklejki -->
        <div id="product-grid" class="grid"></div>
    </section>
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

 <!-- Tło zaciemniające (Overlay) -->
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

    <!-- Wysuwany Koszyk -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Twój Koszyk</h2>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>
        
        <div class="cart-items" id="cart-items-container">
            <!-- Tutaj JS dynamicznie wygeneruje listę zakupów -->
        </div>
        
        <!-- Zaktualizowany Footer z mapą wewnątrz sidebar'a -->
        <div class="cart-footer">
            <div class="shipping-section" style="margin-bottom: 20px; border-top: 1px solid #27272a; padding-top: 20px;">
                <h4 style="margin-bottom: 15px;">Wybierz dostawę (Darmowa od 70 zł):</h4>
                
                <label style="display: block; margin-bottom: 10px; cursor: pointer;">
                    <input type="radio" name="shipping" value="inpost" onchange="updateCartUI()" checked> 
                    Paczkomat InPost (15.00 zł)
                </label>
                
                <button id="open-map-btn" onclick="openInPostMap()" style="margin-bottom: 10px; padding: 10px; width: 100%; background: var(--surface-color); color: var(--text-main); border: 1px dashed #555; cursor: pointer; border-radius: 4px; transition: border-color 0.3s;">
                    Wybierz Paczkomat na mapie
                </button>
                
                <!-- Poprawiony kolor komunikatu na zieleń (sukces) -->
                <div id="selected-paczkomat" style="color: #10b981; font-weight: 700; font-size: 14px; margin-bottom: 15px; display: none;"></div>

                <label style="display: block; cursor: pointer;">
                    <input type="radio" name="shipping" value="kurier" onchange="updateCartUI()"> 
                    Kurier pod drzwi (20.00 zł)
                </label>
            </div>

            <div class="cart-total">Suma: <span id="cart-total-price">0.00</span> zł</div>
            <p style="color: var(--text-muted); font-size: 12px; text-align: center; margin-bottom: 15px;">Wysyłka w ciągu max 3 dni roboczych.</p>
            <button class="checkout-btn" onclick="goToCheckout()">Kupuję z obowiązkiem zapłaty</button>
        </div>
    </div>
    <!-- Nasz własny modal z mapą InPost -->
    <div id="inpost-custom-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 999999; flex-direction: column;">
        
        <!-- Pasek nawigacyjny, który MY kontrolujemy -->
        <div style="background: #1a1a1d; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-color);">
            <h3 style="color: #fff; margin: 0; font-size: 18px;">Wybierz Paczkomat</h3>
            <!-- Ten przycisk zamknie mapę bez pytania InPostu o zgodę -->
            <button onclick="closeInPostMap()" style="background: #ef4444; color: #fff; border: none; padding: 10px 20px; font-size: 16px; font-weight: 900; border-radius: 6px; cursor: pointer;">ZAMKNIJ X</button>
        </div>
        
        <!-- Samo serce najnowszej mapy -->
        <div style="flex-grow: 1; width: 100%; background: #fff; position: relative;">
            <inpost-geowidget onpoint="onPaczkomatSelected" language="pl" config="widget"></inpost-geowidget>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
