<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WlepyNaFury.pl | Najlepsze naklejki motoryzacyjne</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <!-- Skrypty Mapy InPost -->
    <link rel="stylesheet" href="https://geowidget.easypack24.net/css/easypack.css"/>
    <script src="https://geowidget.easypack24.net/js/sdk-for-javascript.js"></script>
</head>
<body>

    <!-- Nawigacja -->
    <nav class="navbar">
        <a href="#" class="logo">WlepyNa<span>Fury</span></a>
        <div class="cart-icon" id="cart-btn">
            Koszyk (<span id="cart-count">0</span>)
        </div>
    </nav>

    <!-- Sekcja Hero -->
    <header class="hero">
        <div class="hero-content">
            <h1>Naklejki z charakterem</h1>
            <p>Najwyższa jakość folii. Twój wóz zasługuje na to, co najlepsze.</p>
        </div>
    </header>

    <!-- Siatka Produktów -->
    <section class="products">
        <h2 class="section-title">Kolekcja</h2>
        <!-- Tutaj JS wygeneruje naklejki -->
        <div id="product-grid" class="grid"></div>
    </section>
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

 <!-- Tło zaciemniające (Overlay) -->
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

    <!-- Wysuwany Koszyk -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Twój Koszyk</h2>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>
        
        <div class="cart-items" id="cart-items-container">
            <!-- Tutaj JS dynamicznie wygeneruje listę zakupów -->
        </div>
        
        <!-- Zaktualizowany Footer z mapą wewnątrz sidebar'a -->
        <div class="cart-footer">
            <div class="shipping-section" style="margin-bottom: 20px; border-top: 1px solid #27272a; padding-top: 20px;">
                <h4 style="margin-bottom: 15px;">Wybierz dostawę (Darmowa od 70 zł):</h4>
                
                <label style="display: block; margin-bottom: 10px; cursor: pointer;">
                    <input type="radio" name="shipping" value="inpost" onchange="updateCartUI()" checked> 
                    Paczkomat InPost (15.00 zł)
                </label>
                
                <button id="open-map-btn" onclick="openInPostMap()" style="margin-bottom: 10px; padding: 10px; width: 100%; background: var(--surface-color); color: var(--text-main); border: 1px dashed #555; cursor: pointer; border-radius: 4px; transition: border-color 0.3s;">
                    Wybierz Paczkomat na mapie
                </button>
                
                <!-- Poprawiony kolor komunikatu na zieleń (sukces) -->
                <div id="selected-paczkomat" style="color: #10b981; font-weight: 700; font-size: 14px; margin-bottom: 15px; display: none;"></div>

                <label style="display: block; cursor: pointer;">
                    <input type="radio" name="shipping" value="kurier" onchange="updateCartUI()"> 
                    Kurier pod drzwi (20.00 zł)
                </label>
            </div>

            <div class="cart-total">Suma: <span id="cart-total-price">0.00</span> zł</div>
            <p style="color: var(--text-muted); font-size: 12px; text-align: center; margin-bottom: 15px;">Wysyłka w ciągu max 3 dni roboczych.</p>
            <button class="checkout-btn" onclick="goToCheckout()">Kupuję z obowiązkiem zapłaty</button>
        </div>
    </div>
    <!-- Skrypty na dole strony dla lepszej wydajności -->
    <script src="app.js"></script>
</body>
</html>
